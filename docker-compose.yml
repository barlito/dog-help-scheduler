services:
    php:
        image: doghelp-php
        build:
            context: .
            dockerfile: .docker/Dockerfile
            target: frankenphp_dev
            args:
                USER_ID: ${USER_ID:-1000}
                GROUP_ID: ${GROUP_ID:-1000}
        environment:
            SERVER_NAME: ":80"
            # Clés du hub Mercure embarqué dans FrankenPHP (cf. Caddyfile). Doivent
            # matcher MERCURE_JWT_SECRET côté Symfony (.env).
            MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
            MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
        volumes:
            - ./:/app
            - ./.docker/franken/Caddyfile:/etc/caddy/Caddyfile
            - ~/.composer:/home/www/.composer:delegated
            - doghelp_caddy_data:/data
            - doghelp_caddy_config:/config
        tty: true
        deploy:
            labels:
                - traefik.enable=true

                - traefik.http.services.doghelp.loadbalancer.server.port=80

                - traefik.http.routers.doghelp.rule=Host(`doghelp.local.barlito.fr`)
                - traefik.http.routers.doghelp.entrypoints=http
#                - traefik.http.routers.doghelp.middlewares=tls-redirectscheme

                - traefik.http.routers.doghelp-secure.rule=Host(`doghelp.local.barlito.fr`)
                - traefik.http.routers.doghelp-secure.entrypoints=https
                - traefik.http.routers.doghelp-secure.tls=true
        networks:
            - traefik_traefik_proxy
            - doghelp_internal

    # Messenger worker: consumes the Scheduler transport (plans each day) AND the
    # async Doctrine transport (sends ntfy notifications at their scheduled time).
    worker:
        image: doghelp-php
        depends_on:
            - php
            - db
        command: php bin/console messenger:consume scheduler_app async --time-limit=3600 -vv
        # The base image HEALTHCHECK probes the Caddy metrics endpoint (:2019); the
        # worker doesn't run the web server, so disable it to avoid false "unhealthy".
        healthcheck:
            disable: true
        volumes:
            - ./:/app
            - ~/.composer:/home/www/.composer:delegated
        deploy:
            restart_policy:
                condition: any
        networks:
            - doghelp_internal

    db:
        image: postgres:${POSTGRES_VERSION:-18}-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-app}
            POSTGRES_USER: ${POSTGRES_USER:-app}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
        healthcheck:
            test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
            timeout: 5s
            retries: 5
            start_period: 60s
        volumes:
            # Postgres 18+ images store data in /var/lib/postgresql (major-version
            # subdirs), not /var/lib/postgresql/data anymore.
            - doghelp_db_data:/var/lib/postgresql:rw
        networks:
            - doghelp_internal

volumes:
    doghelp_caddy_data:
    doghelp_caddy_config:
    doghelp_db_data:

networks:
    traefik_traefik_proxy:
        external: true
    # No explicit driver: `docker stack deploy` defaults to overlay (swarm),
    # `docker compose up` (CI mode) defaults to bridge — works in both.
    doghelp_internal:
