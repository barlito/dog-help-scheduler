; Config PHP partagée dev + prod (chargée via $PHP_INI_DIR/conf.d/)

; Fuseau par défaut de l'app : sans ça PHP est en UTC, donc les `new DateTimeImmutable()`
; (createdAt/sentAt/respondedAt) et l'hydratation Doctrine des colonnes datetime se font
; en UTC → EasyAdmin affiche les horaires en UTC au lieu d'Europe/Paris.
date.timezone = Europe/Paris

expose_php = 0
