security:
    # Single admin identity (no User table, no password): the whitelisted Discord
    # account is mapped onto this "admin" user by DiscordAuthenticator.
    providers:
        admin_provider:
            memory:
                users:
                    admin:
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: admin_provider
            custom_authenticators:
                - App\Security\DiscordAuthenticator
            # Discord OAuth is the only login. The authenticator's entry point kicks
            # off a silent Discord login (prompt=none) so an already-logged-in Discord
            # user is signed in seamlessly, falling back to the login page on error.
            entry_point: App\Security\DiscordAuthenticator
            # Keep the session alive across restarts: always issue a remember-me cookie
            # (no checkbox — the single whitelisted account always opts in).
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # 30 days
                always_remember_me: true
            logout:
                path: logout
                target: login

    # Note: Only the *first* matching rule is applied.
    # The public ntfy callback /n/... has no rule, so it stays reachable without auth.
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
