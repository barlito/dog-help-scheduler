security:
    # Single admin identity (no User table, no password): the whitelisted Discord
    # account is mapped onto this "admin" user by DiscordAuthenticator.
    providers:
        admin_provider:
            memory:
                users:
                    admin:
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: admin_provider
            custom_authenticators:
                - App\Security\DiscordAuthenticator
            # Discord OAuth is the only login. Unauthenticated users are sent to the
            # login page (which only offers the Discord button) by the authenticator's
            # entry point.
            entry_point: App\Security\DiscordAuthenticator
            logout:
                path: logout
                target: login

    # Note: Only the *first* matching rule is applied.
    # The public ntfy callback /n/... has no rule, so it stays reachable without auth.
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
