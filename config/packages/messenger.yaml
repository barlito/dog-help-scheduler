framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    # Let the worker pick delayed messages as soon as they are due (LISTEN/NOTIFY).
                    use_notify: true
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            # Sent at its randomly-picked time via a DelayStamp, handled by the worker.
            App\Message\SendNotificationMessage: async
            # PlanDayMessage is delivered by the Scheduler transport (scheduler_app)
            # and handled directly by the worker — no routing needed here.

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
