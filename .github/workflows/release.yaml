name: Release Workflow

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      # Buildx + cache type=registry permettent de réutiliser les layers Docker
      # entre runs, indépendamment du ref Git. Le cache est stocké sur Docker Hub
      # sous le tag :buildcache (séparé des images runnables), accessible depuis
      # n'importe quelle release.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_READ_WRITE_DELETE_ACCESS_TOKEN }}

      - name: Build & Push Main Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          target: frankenphp_prod
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doghelp:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/doghelp:latest
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doghelp:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doghelp:buildcache,mode=max

      # Le worker hérite de frankenphp_prod (FROM frankenphp_prod) : il réutilise
      # toutes les layers du Main via cache-from. Pas de cache-to ici, sinon son
      # mode=max écraserait le cache complet du Main par ce qu'il a (re)construit.
      # Seul le Main écrit le cache, le worker lit uniquement.
      - name: Build & Push Worker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile
          target: frankenphp_worker_prod
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doghelp-worker:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/doghelp-worker:latest
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doghelp:buildcache
